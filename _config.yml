title: Fullspark Labs
description: Developer productivity CLI tools and tutorials
url: https://fullspark-labs.github.io

# Use GitHub Pages default theme (Primer)
theme: jekyll-theme-primer

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Excerpts
excerpt_separator: "<!--more-->"

# Author
author: Fullspark Labs
github_username: Fullspark-Labs

# Social links
social:
  github: Fullspark-Labs

# Footer
footer:
  links:
    - label: GitHub
      url: https://github.com/Fullspark-Labs
    - label: npm
      url: https://www.npmjs.com/org/fullsparklabs

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post