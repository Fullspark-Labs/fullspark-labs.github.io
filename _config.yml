title: Fullspark Labs
description: Developer productivity CLI tools and tutorials
author: Fullspark Labs
url: https://fullspark-labs.github.io
github_username: Fullspark-Labs
twitter_username: fullsparklabs

# GitHub Pages compatible config - no custom theme
# Theme is handled by GitHub Pages
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Build settings
exclude:
  - Gemfile
  - Gemfile.lock

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Excerpts
excerpt_separator: <!--more-->

# Social
social:
  name: Fullspark Labs
  links:
    - https://github.com/Fullspark-Labs
    - https://twitter.com/fullsparklabs

# Footer
footer:
  links:
    - label: GitHub
      url: https://github.com/Fullspark-Labs
    - label: npm
      url: https://www.npmjs.com/org/fullsparklabs

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      show_excerpts: true