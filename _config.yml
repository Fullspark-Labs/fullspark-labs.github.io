title: Fullspark Labs
url: https://fullspark-labs.github.io
author: Fullspark Labs
github_username: Fullspark-Labs

# Indigo theme config
dark-theme: false
width: normal
projects: true
about: true
blog: true

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Excerpts
excerpt_separator: "<!--more-->"

# Social links
social:
  github: Fullspark-Labs

# Footer
footer:
  links:
    - label: GitHub
      url: https://github.com/Fullspark-Labs
    - label: npm
      url: https://www.npmjs.com/org/fullsparklabs

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - FAQ.md
  - vendor